<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KG Favicon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="22%" r="75%">
      <stop offset="0%" stop-color="#1a0029"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00c8"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#bg)"/>
  <rect x="5" y="5" width="54" height="54" rx="12" fill="none" stroke="url(#glow)" stroke-width="2.5"/>

  <text x="50%" y="56%" text-anchor="middle" dominant-baseline="middle"
      font-family="'Courier New', monospace" font-size="36" font-weight="800"
        fill="url(#glow)" filter="url(#softGlow)">KG</text>

  <circle cx="14" cy="14" r="2.2" fill="#ff00c8"/>
  <circle cx="50" cy="50" r="2.2" fill="#00e5ff"/>
</svg>
