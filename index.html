<style>

body{
margin:0;

background: radial-gradient(circle at top,#1a0029,#000000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;

/* card */

.card{
padding:40px;
border-radius:14px;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(6px);
border:1px solid #ff00c8;
box-shadow:
0 0 15px #ff00c8,
0 0 40px #00e5ff;
max-width:420px;
width:90%;
}

/* title */

.title{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
font-size:clamp(28px,6vw,36px);
margin-bottom:5px;
color:#00e5ff;
text-shadow:
0 0 6px #00e5ff,
0 0 18px #00e5ff;
}

/* subtitle */

.subtitle{
color:#ff00c8;
margin-bottom:30px;
font-size:clamp(14px,4vw,18px);
text-shadow:0 0 10px #ff00c8;
}

/* github icon */

.github svg{
width:26px;
height:26px;
color:#ff00c8;
filter: drop-shadow(0 0 6px #ff00c8);
transition:0.2s;
}

.github svg:hover{
color:#00e5ff;
transform:scale(1.2);
}

/* buttons */

a.button{
display:block;
margin:12px 0;
padding:16px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
letter-spacing:1px;
background: linear-gradient(90deg,#ff00c8,#00e5ff);
color:black;
transition:0.2s;
font-size:18px;
}

a.button:hover{
transform:scale(1.05);
box-shadow:
0 0 12px #ff00c8,
0 0 20px #00e5ff;
}

/* git easter egg */

.git{
margin-top:28px;
font-size:14px;
color:#00e5ff;
opacity:0.85;
}

</style>
